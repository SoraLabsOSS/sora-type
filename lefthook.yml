pre-commit:
  jobs:
    - run: bun x ultracite fix
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true

    - run: bun run i18n:sync-extension
      glob:
        - "packages/i18n-content/src/locales/**/extension.json"
      stage_fixed: true

pre-push:
  jobs:
    - run: bun run build
