name: Publish Sora Type Extension

# Only publishes updates to an *existing* Edge Add-ons listing (the
# wdzeng/edge-addon action can't create a new listing) — the first
# submission still has to go through the Partner Center dashboard once
# to get a Product ID.
on:
  push:
    tags:
      - "extension-v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/extension
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Build and zip extension
        run: bun run zip

      - name: Publish to Microsoft Edge Add-ons
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_API_KEY }}
          zip-path: apps/extension/.output/*-chrome.zip
